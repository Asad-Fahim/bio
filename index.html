    <style media="all">

*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  -webkit-font-smoothing: auto;
}

button {
  -webkit-font-smoothing: inherit;
  -moz-osx-font-smoothing: inherit;
  -webkit-appearance: none;
}
* {
  padding: 0;
  margin: 0;
}a {
  color: inherit;
  text-decoration: inherit;
}
input {
  border: none;
  font: inherit;
  outline: none;
  background-color: inherit;
}
button {
  border-style: none;
  width: auto;
  overflow: visible;
  background: transparent;
  font: inherit;
  line-height: normal;
  color: inherit;
}
textarea {
  font: inherit;
  background-color: inherit;
}
select {
  font: inherit;
  background-color: inherit;
}
img {
  display: block;
}
picture {
  display: block;
}
video {
  display: block;
}
canvas {
  display: block;
}
svg {
  display: block;
}

[data-visible='false']{
  display:none!important;
}

.before-hidden::before {
  display:none;
}

.after-hidden::after {
  display:none;
}

.before-visible::before {
  content: "";
}

.after-visible::after {
  content: "";
}

.text {
  white-space: pre-wrap;
  overflow-wrap: break-word;
}

/* ── Responsive layout ── */
.page {
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(1rem, 4vw, 2.5rem);
  background: linear-gradient(68.7deg, #a4c2b9 0.9%, #667ba2 95.8%);
}

.card {
  width: min(630px, 100%);
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
}

.card__hero {
  aspect-ratio: 630 / 398;
  position: relative;
  overflow: hidden;
}

.card__hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card__body {
  padding: clamp(1.75rem, 5vw, 3rem) clamp(1.25rem, 4vw, 2.5rem) clamp(2rem, 6vw, 3.5rem);
  text-align: center;
}

.card__name {
  font-family: Playfair, system-ui, sans-serif;
  font-size: clamp(1.75rem, 5vw, 2.5rem);
  font-weight: 400;
  font-stretch: 100%;
  text-transform: uppercase;
  color: #4f5c63;
  margin-bottom: 0.75rem;
  line-height: 1.2;
}

.card__title {
  font-family: Roboto, system-ui, sans-serif;
  font-size: clamp(1rem, 3vw, 1.5rem);
  font-weight: 400;
  font-stretch: 100%;
  text-transform: capitalize;
  color: #000;
  opacity: 0.7;
  margin-bottom: clamp(1.5rem, 4vw, 2.5rem);
  line-height: 1.4;
}

.social-icons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: clamp(0.75rem, 3vw, 1.25rem);
}

/* ── Social icon base ── */
.social-icon {
  --icon-color: #88a5ab;
  --icon-hover: #667ba2;
  position: relative;
  display: grid;
  place-items: center;
  width: clamp(48px, 12vw, 57px);
  height: clamp(48px, 12vw, 57px);
  border-radius: 50%;
  border: 1px solid rgba(150, 164, 173, 0.7);
  overflow: hidden;
  color: var(--icon-color);
  transition:
    transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
    box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1),
    border-color 0.35s ease,
    color 0.35s ease;
  transform-style: preserve-3d;
  perspective: 600px;
}

.social-icon svg {
  position: relative;
  z-index: 2;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
}

.social-icon svg path {
  fill: currentColor;
  transition: fill 0.3s ease;
}

.social-icon--twitter  { --icon-hover: #1da1f2; }
.social-icon--discord  { --icon-hover: #5865f2; }
.social-icon--instagram { --icon-hover: #e4405f; }
.social-icon--email    { --icon-hover: #667ba2; }

/* Slide-up fill (::before) */
.social-icon::before {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--icon-hover);
  border-radius: 50%;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1;
}

.social-icon:hover::before,
.social-icon:focus-visible::before {
  transform: translateY(0);
}

/* Semicircle fill (::after) — Discord & Instagram */
.social-icon--circle-fill::after {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--icon-hover);
  border-radius: 50%;
  clip-path: circle(0% at 50% 100%);
  transition: clip-path 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1;
}

.social-icon--circle-fill:hover::after,
.social-icon--circle-fill:focus-visible::after {
  clip-path: circle(75% at 50% 50%);
}

.social-icon--circle-fill::before {
  display: none;
}

.social-icon--circle-fill:hover::before,
.social-icon--circle-fill:focus-visible::before {
  transform: translateY(100%);
}

/* Hover: color flip + Y-axis rotation + 3D lift */
.social-icon:hover,
.social-icon:focus-visible {
  color: #fff;
  border-color: var(--icon-hover);
  transform: translateY(-6px) rotateX(8deg) rotateY(-6deg);
  box-shadow:
    0 14px 28px rgba(0, 0, 0, 0.18),
    0 4px 10px rgba(102, 123, 162, 0.25);
}

.social-icon:hover svg,
.social-icon:focus-visible svg {
  transform: rotateY(360deg) scale(1.08);
}

.social-icon--circle-fill:hover,
.social-icon--circle-fill:focus-visible {
  transform: translateY(-6px) rotateX(10deg) rotateY(8deg) skew(-1deg, 1deg);
}

.social-icon:focus-visible {
  outline: 2px solid var(--icon-hover);
  outline-offset: 3px;
}

/* Icon SVG sizing */
.social-icon--twitter svg {
  width: 42%;
  height: auto;
}

.social-icon--discord svg,
.social-icon--instagram svg {
  width: 44%;
  height: auto;
}

.social-icon--email svg {
  width: 56%;
  height: auto;
}

.social-icon--email svg path[stroke] {
  stroke: #fff;
  transition: stroke 0.3s ease;
}

.social-icon--email:hover svg path:first-child,
.social-icon--email:focus-visible svg path:first-child {
  fill: rgba(255, 255, 255, 0.2);
}

.social-icon--email:hover svg path[stroke],
.social-icon--email:focus-visible svg path[stroke] {
  stroke: #fff;
}

@media (max-width: 480px) {
  .page {
    padding: 0.75rem;
  }

  .card {
    border-radius: 8px;
  }
}

@media (prefers-reduced-motion: reduce) {
  .social-icon,
  .social-icon::before,
  .social-icon::after,
  .social-icon svg {
    transition: none !important;
  }

  .social-icon:hover,
  .social-icon:focus-visible {
    transform: none;
  }

  .social-icon:hover svg,
  .social-icon:focus-visible svg {
    transform: none;
  }
}
</style>
